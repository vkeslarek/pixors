[package]
name = "pixors-engine"
version = "0.1.0"
edition = "2024"

[dependencies]
# Core Phase 1
half = { version = "2.7.1", features = ["bytemuck", "use-intrinsics"] }
bytemuck = "1.25.0"
png = "0.18.1"
thiserror = "2.0.18"
anyhow = "1.0.102"
tracing = "0.1.44"
tracing-subscriber = "0.3.23"
# SIMD utilities
wide = "0.7.21"

# WebSocket server (Phase 3)
tokio = { version = "1.0", features = ["full"] }
axum = { version = "0.7", features = ["ws"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
futures-util = "0.3"
uuid = { version = "1.10", features = ["serde", "v4"] }

# Vulkan/GPU (optional, future phases)
ash = { version = "0.38.0+1.3.281", optional = true }
ash-window = { version = "0.13.0", optional = true }
async-trait = "0.1.89"
futures = "0.3.32"
tower-http = { version = "0.6.8", features = ["cors"] }
rayon = "1.12.0"
lru = "0.12"
tempfile = "3.27.0"

[dev-dependencies]
