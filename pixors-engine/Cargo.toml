[package]
name = "pixors-engine"
version = "0.1.0"
edition = "2024"

[dependencies]
# Core Phase 1
half = { version = "2.7.1", features = ["bytemuck", "use-intrinsics"] }
bytemuck = "1.25.0"
png = "0.18.1"
thiserror = "2.0.18"
anyhow = "1.0.102"
tracing = "0.1.44"
tracing-subscriber = "0.3.23"
# Display (optional, for validation)
softbuffer = { version = "0.4.8" }
winit = { version = "0.30.13" }
raw-window-handle = { version = "0.6.2" }
wide = "0.7.21"

# Vulkan/GPU (optional, future phases)
ash = { version = "0.38.0+1.3.281", optional = true }
ash-window = { version = "0.13.0", optional = true }
async-trait = { version = "0.1.89", optional = true }
futures = { version = "0.3.32", optional = true }

[dev-dependencies]
tempfile = "3.27.0"
