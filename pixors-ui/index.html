<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixors</title>

  <style>
    /* Reset básico */
    body {
      margin: 0;
    }

    /* Container do Splash Screen */
    #native-splash {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: rgb(30, 30, 30);
      color: white;
      font-family: sans-serif;
      z-index: 9999;
      opacity: 1;
      transition: opacity 0.5s ease;
    }

    /* Tipografia do Splash */
    #native-splash h1 {
      margin-top: 0;
      margin-bottom: 10px;
    }

    #native-splash p {
      margin: 0;
      color: #888;
    }

    /* A mágica do Spinner em CSS puro */
    .spinner {
      width: 45px;
      height: 45px;
      /* O anel de fundo escuro/translúcido */
      border: 4px solid rgba(255, 255, 255, 0.1);
      /* A ponta que gira */
      border-left-color: #007bff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

</body>

</html>
