name: Release

on:
  push:
    branches: [release/**]

jobs:
  # ── Linux ───────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libx11-dev \
            libxrandr-dev \
            libxi-dev \
            libxcursor-dev \
            libegl-dev \
            libfontconfig1-dev

      - name: Install slangc
        env:
          SLANG_VERSION: 2026.8.1
        run: |
          mkdir -p /tmp/slang
          curl -fsSL "https://github.com/shader-slang/slang/releases/download/v${SLANG_VERSION}/slang-${SLANG_VERSION}-linux-x86_64.tar.gz" \
            | tar xz -C /tmp/slang
          SLANGC=$(find /tmp/slang -name slangc -type f | head -1)
          echo "$(dirname "$SLANGC")" >> "$GITHUB_PATH"

      - name: Build
        run: cargo build --release -p pixors-desktop

      - name: Package
        run: tar czf pixors-linux-x86_64.tar.gz -C target/release pixors-desktop

      - uses: actions/upload-artifact@v4
        with:
          name: pixors-linux-x86_64
          path: pixors-linux-x86_64.tar.gz

  # ── Windows (cross-compile from Linux) ──────────────
  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu
      - uses: Swatinem/rust-cache@v2

      - name: Install cross-compile toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 pkg-config

      - name: Install slangc
        env:
          SLANG_VERSION: 2026.8.1
        run: |
          mkdir -p /tmp/slang
          curl -fsSL "https://github.com/shader-slang/slang/releases/download/v${SLANG_VERSION}/slang-${SLANG_VERSION}-linux-x86_64.tar.gz" \
            | tar xz -C /tmp/slang
          SLANGC=$(find /tmp/slang -name slangc -type f | head -1)
          echo "$(dirname "$SLANGC")" >> "$GITHUB_PATH"

      - name: Build
        run: cargo build --release -p pixors-desktop --target x86_64-pc-windows-gnu

      - name: Package
        run: |
          zip pixors-windows-x86_64.zip \
            target/x86_64-pc-windows-gnu/release/pixors-desktop.exe

      - uses: actions/upload-artifact@v4
        with:
          name: pixors-windows-x86_64
          path: pixors-windows-x86_64.zip

  # ── macOS ───────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install slangc
        env:
          SLANG_VERSION: 2026.8.1
        run: |
          mkdir -p /tmp/slang
          curl -fsSL "https://github.com/shader-slang/slang/releases/download/v${SLANG_VERSION}/slang-${SLANG_VERSION}-macos-aarch64.tar.gz" \
            | tar xz -C /tmp/slang
          SLANGC=$(find /tmp/slang -name slangc -type f | head -1)
          echo "$(dirname "$SLANGC")" >> "$GITHUB_PATH"

      - name: Build
        run: cargo build --release -p pixors-desktop

      - name: Package
        run: tar czf pixors-macos-arm64.tar.gz -C target/release pixors-desktop

      - uses: actions/upload-artifact@v4
        with:
          name: pixors-macos-arm64
          path: pixors-macos-arm64.tar.gz

  # ── GitHub Release ──────────────────────────────────
  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: pixors-*
          merge-multiple: true
          path: artifacts/

      - name: Extract version
        id: version
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's|release/||')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Pixors v${{ steps.version.outputs.version }}
          files: artifacts/*
          generate_release_notes: true
