name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-test-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libx11-dev \
            libxrandr-dev \
            libxi-dev \
            libxcursor-dev \
            libegl-dev \
            libfontconfig1-dev

      - name: Install slangc
        env:
          SLANG_VERSION: 2026.8.1
        run: |
          mkdir -p /tmp/slang
          curl -fsSL "https://github.com/shader-slang/slang/releases/download/v${SLANG_VERSION}/slang-${SLANG_VERSION}-linux-x86_64.tar.gz" \
            | tar xz -C /tmp/slang
          SLANGC=$(find /tmp/slang -name slangc -type f | head -1)
          echo "$(dirname "$SLANGC")" >> "$GITHUB_PATH"

      - run: cargo check --workspace
      - run: cargo test --workspace
      - run: cargo clippy --workspace -- -D warnings
